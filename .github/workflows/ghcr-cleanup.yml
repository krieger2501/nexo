name: GHCR Cleanup

on:
  schedule:
    # Sundays at 04:30 UTC — off-peak, after the Monday Renovate batch settles.
    - cron: '30 4 * * 0'
  workflow_dispatch:

permissions:
  contents: read
  packages: write

jobs:
  prune-main-shas:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.0

      - name: Setup pnpm
        uses: pnpm/action-setup@0e279bb959325dab635dd2c09392533439d90093 # v6.0.0
        env:
          PNPM_HOME: ${{ runner.temp }}/pnpm

      - name: Setup Node
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.0.0
        with:
          node-version-file: .node-version
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Prune old :main-<sha> images across all packages
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: pnpm exec nexo prune-main-shas
