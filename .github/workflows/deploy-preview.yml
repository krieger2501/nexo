name: Deploy Preview

on:
  workflow_dispatch:
    inputs:
      pr_number:
        description: PR number that triggered this deployment
        required: true
      sha:
        description: Commit SHA to deploy
        required: true
      comment_id:
        description: Bot comment ID to update
        required: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ inputs.sha }}

      - name: Deploy preview to VPS
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          script: |
            set -e
            cd /home/deploy/nexo
            git fetch origin
            git checkout ${{ inputs.sha }}

            export PUBLIC_APP_VERSION=pr-${{ inputs.pr_number }}

            docker compose -f docker-compose.preview.yml \
              --env-file .env.preview \
              up -d --build --remove-orphans

      - name: Update bot comment — success
        uses: actions/github-script@v7
        if: success()
        with:
          app-id: ${{ secrets.GH_APP_ID }}
          private-key: ${{ secrets.GH_APP_PRIVATE_KEY }}
          script: |
            const { createAppAuth } = require('@octokit/auth-app');
            const { Octokit } = require('@octokit/rest');
            const auth = createAppAuth({
              appId: ${{ secrets.GH_APP_ID }},
              privateKey: `${{ secrets.GH_APP_PRIVATE_KEY }}`,
            });
            const { token } = await auth({ type: 'installation', installationId: process.env.INSTALLATION_ID });
            const octokit = new Octokit({ auth: token });
            await octokit.issues.updateComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              comment_id: ${{ inputs.comment_id }},
              body: [
                '### Nexo Preview',
                '',
                '**Status:** ✅ Deployed',
                '**Commit:** `${{ inputs.sha }}`',
                '',
                '| App | URL |',
                '|---|---|',
                '| Landing | https://preview.krieger2501.de |',
                '| Finance | https://finance.preview.krieger2501.de |',
                '| Auth | https://auth.preview.krieger2501.de |',
                '',
                '<!-- nexo-preview-redeploy -->',
                '> React with 🚀 on this comment to redeploy.',
              ].join('\n'),
            });

      - name: Update bot comment — failure
        uses: actions/github-script@v7
        if: failure()
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            await github.rest.issues.updateComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              comment_id: ${{ inputs.comment_id }},
              body: [
                '### Nexo Preview',
                '',
                '**Status:** ❌ Deployment failed — check the [Actions run](${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}) for details.',
              ].join('\n'),
            });
