name: PR Cleanup

on:
  pull_request:
    types: [closed]

permissions:
  contents: read
  packages: write

jobs:
  delete-pr-images:
    # Merged PRs are kept: their :pr-NN image is the source the main push retags
    # as :main / :main-<sha> via `imagetools create`. Deleting it could orphan
    # blobs the new manifest references. Merged tags age out organically — the
    # repo is public, GHCR storage is free, and the namespace cost is small.
    if: github.event.pull_request.merged == false
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.0

      - name: Setup pnpm
        uses: pnpm/action-setup@0e279bb959325dab635dd2c09392533439d90093 # v6.0.0
        env:
          PNPM_HOME: ${{ runner.temp }}/pnpm

      - name: Setup Node
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.0.0
        with:
          node-version-file: .node-version
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Delete :pr-${{ github.event.number }} across all packages
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: pnpm exec nexo prune-pr-images --pr ${{ github.event.number }}
