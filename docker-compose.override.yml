# Local dev override — swaps production URLs for localhost equivalents
# Docker Compose merges this automatically on top of docker-compose.yml when you run `docker compose up`
services:
  postgres:
    ports:
      - "5433:5432"

  auth:
    ports:
      - "3001:3000"
    environment:
      PUBLIC_AUTH_URL: http://localhost:3001
      FINANCE_URL: http://localhost:3002
      ORIGIN: http://localhost:3001

  finance:
    ports:
      - "3002:3000"
    environment:
      PUBLIC_AUTH_URL: http://localhost:3001
      PUBLIC_FINANCE_URL: http://localhost:3002
      ORIGIN: http://localhost:3002

  landing:
    build:
      args:
        PUBLIC_FINANCE_URL: http://localhost:3002
    ports:
      - "3000:3000"
